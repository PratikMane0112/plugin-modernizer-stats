version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "daily"

    open-pull-requests-limit: 10

    # Group routine version bumps into a single PR
    groups:
      production-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

    # Ignore major bumps for routine updates.
    # Security updates bypass ignore rules automatically,
    # so CVE fixes that require a major bump still get PRs.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gh-actions:
        patterns:
          - "*"
