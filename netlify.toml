[build]
  # Command to run before build
  command = "chmod +x ./fetch-metadata-plugin-modernizer.sh && ./fetch-metadata-plugin-modernizer.sh && npx tsx scripts/consolidate.ts && npm run build"
  
  # Directory with the built files
  publish = "dist"

# Serve metadata files directly (must come before SPA catch-all)
[[redirects]]
  from = "/metadata/*"
  to = "/metadata/:splat"
  status = 200

# Redirect rules for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better caching
[[headers]]
  for = "/metadata/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
